apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ranking-service.fullname" . }}
  labels:
    {{- include "ranking-service.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.app.port | quote }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  CACHE_TTL_SECONDS: {{ .Values.app.cacheTtlSeconds | quote }}
