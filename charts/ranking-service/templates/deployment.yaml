apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ranking-service.fullname" . }}
  labels:
    {{- include "ranking-service.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ranking-service.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ranking-service.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "ranking-service.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ranking-service.fullname" . }}
            {{- if .Values.github.token }}
            - secretRef:
                name: {{ include "ranking-service.fullname" . }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
