replicaCount: 2

image:
  repository: ranking-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

app:
  port: 3000
  cacheTtlSeconds: 300

redis:
  url: redis://redis:6379

github:
  token: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

